<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zedox Admin — CDK Control Center</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
/* ===== RESET & ROOT ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--surface:#111118;--surface2:#16161f;--border:#252535;
  --text:#e8e8f0;--text2:#9898b0;--text3:#606080;
  --accent:#6c5ce7;--accent2:#00d4aa;--danger:#ff4757;--warning:#ffa502;
  --glow-accent:rgba(108,92,231,0.4);--glow-green:rgba(0,212,170,0.3);
  --radius:16px;--radius-sm:10px;--radius-xs:6px;
  --font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;
  background-image:
    radial-gradient(ellipse 80% 50% at 20% 0%,rgba(108,92,231,0.08),transparent),
    radial-gradient(ellipse 60% 40% at 80% 80%,rgba(0,212,170,0.06),transparent),
    radial-gradient(ellipse 40% 30% at 50% 50%,rgba(255,71,87,0.03),transparent);
}
.grid-bg{
  position:fixed;inset:0;z-index:-1;opacity:0.03;
  background-image:linear-gradient(rgba(108,92,231,0.3) 1px,transparent 1px),
    linear-gradient(90deg,rgba(108,92,231,0.3) 1px,transparent 1px);
  background-size:60px 60px;
}
.shell{max-width:1400px;margin:0 auto;padding:24px 28px 40px}

/* ===== HEADER ===== */
.top{display:flex;justify-content:space-between;align-items:center;gap:20px;margin-bottom:28px;flex-wrap:wrap}
.logo-wrap{display:flex;align-items:center;gap:16px}
.logo{
  width:52px;height:52px;border-radius:16px;
  background:linear-gradient(135deg,#6c5ce7,#00d4aa);
  display:grid;place-items:center;font-size:24px;
  box-shadow:0 0 40px var(--glow-accent);position:relative;
}
.logo::after{
  content:'';position:absolute;inset:-3px;border-radius:19px;
  background:linear-gradient(135deg,#6c5ce7,#00d4aa,#ff4757);
  z-index:-1;filter:blur(10px);opacity:0.5;animation:pulse 3s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:0.7}}
.logo-wrap h1{
  font-size:26px;font-weight:800;
  background:linear-gradient(135deg,#fff,#b8b0ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.logo-wrap h1 span{color:var(--accent);-webkit-text-fill-color:var(--accent)}
.logo-wrap p{color:var(--text2);font-size:12px;margin-top:2px}
.nav-links{display:flex;gap:10px}
.nav-btn{
  padding:10px 20px;border-radius:999px;font-size:13px;font-weight:600;
  text-decoration:none;color:var(--text);border:1px solid var(--border);
  background:var(--surface);transition:all .2s;cursor:pointer;
}
.nav-btn:hover{background:var(--surface2);border-color:var(--accent)}
.nav-btn.accent{background:linear-gradient(135deg,#6c5ce7,#00d4aa);border-color:transparent;box-shadow:0 0 20px var(--glow-accent)}
.nav-btn.accent:hover{transform:translateY(-1px);box-shadow:0 0 30px var(--glow-accent)}
.nav-btn.danger{color:var(--danger);border-color:rgba(255,71,87,0.3)}
.nav-btn.danger:hover{background:rgba(255,71,87,0.1)}

/* ===== LOGIN ===== */
.login-card{
  max-width:460px;margin:80px auto;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:40px 32px;
  box-shadow:0 20px 60px rgba(0,0,0,.4);
  text-align:center;
}
.login-card .icon{font-size:56px;margin-bottom:16px}
.login-card h2{font-size:24px;margin-bottom:4px}
.login-card .sub{color:var(--text2);font-size:13px;margin-bottom:28px}
.input-group{margin-bottom:18px;text-align:left}
.input-group label{
  display:block;color:var(--text2);font-size:12px;font-weight:600;
  margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;
}
.input-group input{
  width:100%;padding:14px 16px;border:1px solid var(--border);
  background:var(--bg);color:var(--text);border-radius:var(--radius-sm);
  font-size:14px;outline:none;transition:all .2s;
}
.input-group input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,92,231,0.15)}
.btn{
  width:100%;padding:14px;border:0;border-radius:var(--radius-sm);
  font-weight:700;font-size:15px;cursor:pointer;transition:all .3s;color:#fff;
}
.btn-primary{background:linear-gradient(135deg,#6c5ce7,#00d4aa);box-shadow:0 4px 20px var(--glow-accent)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px var(--glow-accent)}
.btn-success{background:linear-gradient(135deg,#00d4aa,#2ed573)}
.btn-warning{background:linear-gradient(135deg,#ffa502,#ffbe76)}
.btn-danger{background:linear-gradient(135deg,#ff4757,#ff6b81)}
.msg{padding:14px;border-radius:var(--radius-sm);font-size:13px;margin-top:12px;display:none}
.msg.show{display:block}
.msg.error{background:rgba(255,71,87,0.1);color:#ff4757;border:1px solid rgba(255,71,87,0.3)}
.msg.success{background:rgba(0,212,170,0.1);color:#00d4aa;border:1px solid rgba(0,212,170,0.3)}

/* ===== STATS ===== */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:24px}
.stat-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px 24px;
  display:flex;align-items:center;gap:16px;transition:all .2s;
}
.stat-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.stat-icon{
  width:52px;height:52px;border-radius:14px;
  display:grid;place-items:center;font-size:22px;flex-shrink:0;
}
.stat-value{display:block;font-size:30px;font-weight:800;line-height:1}
.stat-label{color:var(--text2);font-size:12px;margin-top:4px}

/* ===== CARDS ===== */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:24px;margin-bottom:20px;
}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.card-head h2{font-size:18px;font-weight:700}
.badge{
  font-size:11px;font-weight:700;padding:5px 14px;border-radius:999px;
  background:rgba(108,92,231,0.15);color:var(--accent);
  border:1px solid rgba(108,92,231,0.3);
}

/* ===== GRID ===== */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:900px){.grid-2{grid-template-columns:1fr}}

/* ===== OPTIONS ===== */
.option-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.option-grid.two-col{grid-template-columns:1fr 1fr}
.option-btn{
  padding:14px 12px;border:1px solid var(--border);background:var(--surface2);
  color:var(--text);border-radius:var(--radius-sm);cursor:pointer;
  text-align:center;transition:all .2s;font-size:13px;
}
.option-btn b{display:block;font-size:14px;margin-bottom:2px}
.option-btn span{color:var(--text2);font-size:11px}
.option-btn.selected{border-color:var(--accent);background:rgba(108,92,231,0.1);box-shadow:0 0 15px rgba(108,92,231,0.2)}
.option-btn:hover{border-color:var(--accent)}

.inline{display:flex;gap:12px;flex-wrap:wrap}
.inline>div{flex:1;min-width:150px}

/* ===== KEY LIST ===== */
.key-list{max-height:600px;overflow-y:auto}
.key-list::-webkit-scrollbar{width:4px}
.key-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.key-item{
  background:var(--bg);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:8px;
  display:flex;justify-content:space-between;align-items:center;gap:12px;
}
.key-info{flex:1;min-width:0}
.key-code{
  font-family:'SF Mono',Menlo,monospace;font-size:14px;font-weight:700;
  color:var(--accent2);word-break:break-all;
}
.key-meta{color:var(--text2);font-size:11px;margin-top:4px}
.key-status{
  font-size:10px;font-weight:700;padding:3px 10px;border-radius:999px;white-space:nowrap;
}
.key-status.active{background:rgba(0,212,170,0.15);color:var(--accent2);border:1px solid rgba(0,212,170,0.3)}
.key-status.revoked{background:rgba(255,71,87,0.15);color:var(--danger);border:1px solid rgba(255,71,87,0.3)}
.key-actions{display:flex;gap:6px}
.key-btn{
  padding:6px 12px;border-radius:999px;font-size:11px;font-weight:600;
  border:1px solid var(--border);background:var(--surface2);color:var(--text);
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.key-btn:hover{border-color:var(--accent)}
.key-btn.danger{color:var(--danger);border-color:rgba(255,71,87,0.3)}
.key-btn.danger:hover{background:rgba(255,71,87,0.1)}

/* ===== CHECKOUTS ===== */
.checkout-item{
  background:var(--bg);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:6px;
  display:flex;justify-content:space-between;align-items:center;font-size:13px;
}
.co-status{font-size:10px;font-weight:700;padding:4px 12px;border-radius:999px}
.co-status.pending{background:rgba(255,165,2,0.15);color:var(--warning);border:1px solid rgba(255,165,2,0.3)}
.co-status.completed{background:rgba(0,212,170,0.15);color:var(--accent2);border:1px solid rgba(0,212,170,0.3)}

/* ===== FILTERS ===== */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.filter-btn{
  padding:7px 16px;border-radius:999px;font-size:12px;font-weight:600;
  border:1px solid var(--border);background:var(--surface2);color:var(--text2);
  cursor:pointer;transition:all .2s;
}
.filter-btn.active,.filter-btn:hover{background:rgba(108,92,231,0.15);border-color:var(--accent);color:var(--text)}

/* ===== GENERATED KEY ===== */
.generated-key{
  background:rgba(0,212,170,0.08);border:1px solid rgba(0,212,170,0.3);
  border-radius:var(--radius);padding:24px;text-align:center;margin-top:16px;display:none;
}
.generated-key.show{display:block}
.generated-key .big-key{
  font-family:'SF Mono',Menlo,monospace;font-size:22px;font-weight:800;
  color:var(--accent2);word-break:break-all;margin:12px 0;
}
.generated-key .key-details{color:var(--text2);font-size:13px;margin:8px 0}

/* ===== TOAST ===== */
.toast{
  position:fixed;bottom:28px;right:28px;padding:16px 24px;
  border-radius:var(--radius-sm);font-size:14px;font-weight:600;z-index:999;
  transform:translateY(100px);opacity:0;
  transition:all .4s cubic-bezier(0.16,1,0.3,1);
}
.toast.show{transform:translateY(0);opacity:1}
.toast.s{background:var(--accent2);color:#000}
.toast.e{background:var(--danger);color:#fff}

.hidden{display:none !important}
</style>
</head>
<body>
<div class="grid-bg"></div>
<main class="shell">
  
  <!-- LOGIN -->
  <div class="login-card" id="loginCard">
    <div class="icon">🔐</div>
    <h2>Admin Access</h2>
    <p class="sub">Zedox CDK Management System v3.0</p>
    <div class="input-group"><label>Email</label><input id="loginEmail" value="admin@globexo.com" type="email"></div>
    <div class="input-group"><label>Password</label><input id="loginPass" type="password" placeholder="Enter admin password"></div>
    <button class="btn btn-primary" onclick="doLogin()">Authenticate</button>
    <div class="msg" id="loginMsg"></div>
  </div>

  <!-- DASHBOARD -->
  <div class="hidden" id="dashboard">
    <!-- Header -->
    <div class="top">
      <div class="logo-wrap">
        <div class="logo">⚡</div>
        <div>
          <h1>Zedox <span>Admin</span></h1>
          <p>CDK Control Center · Channel: zedoxprime1 · Contact: @zedox5</p>
        </div>
      </div>
      <div class="nav-links">
        <button class="nav-btn" onclick="window.location='/'">← User Page</button>
        <button class="nav-btn" onclick="window.open('https://console.firebase.google.com','_blank')">🔥 Firebase</button>
        <button class="nav-btn danger" onclick="doLogout()">🚪 Logout</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(108,92,231,0.15)">🔑</div>
        <div><b class="stat-value" id="statKeys">0</b><span class="stat-label">Total Keys</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(0,212,170,0.15)">✅</div>
        <div><b class="stat-value" id="statActive" style="color:var(--accent2)">0</b><span class="stat-label">Active</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(255,165,2,0.15)">📋</div>
        <div><b class="stat-value" id="statUsed" style="color:var(--warning)">0</b><span class="stat-label">Used / Revoked</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(0,180,255,0.15)">💳</div>
        <div><b class="stat-value" id="statCO" style="color:#00b8ff">0</b><span class="stat-label">Checkouts</span></div>
      </div>
    </div>

    <!-- Generate + List -->
    <div class="grid-2">
      <!-- GENERATE -->
      <div class="card">
        <div class="card-head"><h2>🔑 Generate CDK Key</h2><span class="badge">KEY MAKER</span></div>
        
        <label style="color:var(--text2);font-size:12px;font-weight:600;margin-bottom:8px;display:block">Key Type</label>
        <div class="option-grid">
          <button class="option-btn selected" id="typeSingle" onclick="setType('single')"><b>🔑 Single Use</b><span>1 activation</span></button>
          <button class="option-btn" id="typeMulti" onclick="setType('multi')"><b>♾️ Unlimited</b><span>No limit</span></button>
          <button class="option-btn" id="typeCustom" onclick="setType('custom')"><b>📋 Custom</b><span>Set uses</span></button>
        </div>

        <div id="usesRow" style="margin-bottom:16px">
          <label style="color:var(--text2);font-size:12px;font-weight:600;margin-bottom:6px;display:block">Number of Uses</label>
          <input id="usesInput" type="number" value="1" min="1" max="999999" style="width:100%;padding:12px;border:1px solid var(--border);background:var(--bg);color:var(--text);border-radius:var(--radius-sm);outline:none">
        </div>

        <label style="color:var(--text2);font-size:12px;font-weight:600;margin-bottom:8px;display:block">Plan</label>
        <div class="option-grid two-col">
          <button class="option-btn selected" id="planPlus" onclick="setPlan('plus')"><b>💎 ChatGPT Plus</b><span>₹0 Trial</span></button>
          <button class="option-btn" id="planPro" onclick="setPlan('pro')"><b>🔮 ChatGPT Pro</b><span>₹16,500/mo</span></button>
        </div>

        <div class="inline" style="margin-bottom:12px">
          <div>
            <label style="color:var(--text2);font-size:12px;font-weight:600;margin-bottom:6px;display:block">Label / Customer</label>
            <input id="labelInput" placeholder="e.g. Telegram User" style="width:100%;padding:12px;border:1px solid var(--border);background:var(--bg);color:var(--text);border-radius:var(--radius-sm);outline:none">
          </div>
        </div>
        <div class="inline" style="margin-bottom:16px">
          <div>
            <label style="color:var(--text2);font-size:12px;font-weight:600;margin-bottom:6px;display:block">Channel</label>
            <input id="channelInput" value="zedoxprime1" style="width:100%;padding:12px;border:1px solid var(--border);background:var(--bg);color:var(--text);border-radius:var(--radius-sm);outline:none">
          </div>
          <div>
            <label style="color:var(--text2);font-size:12px;font-weight:600;margin-bottom:6px;display:block">Contact</label>
            <input id="contactInput" value="@zedox5" style="width:100%;padding:12px;border:1px solid var(--border);background:var(--bg);color:var(--text);border-radius:var(--radius-sm);outline:none">
          </div>
        </div>

        <button class="btn btn-primary" onclick="genKey()">Generate CDK Key</button>
        <div class="generated-key" id="genResult">
          <div style="font-size:28px">✅</div>
          <div class="big-key" id="genKeyCode"></div>
          <div class="key-details" id="genKeyDetails"></div>
          <div style="display:flex;gap:10px;justify-content:center;margin-top:14px">
            <button class="key-btn" onclick="copyGenKey()">📋 Copy</button>
            <button class="key-btn" onclick="openGenLink()">🔗 Open Link</button>
          </div>
        </div>
      </div>

      <!-- LIST -->
      <div class="card">
        <div class="card-head"><h2>📋 CDK Keys</h2><span class="badge" id="keyCount">0 keys</span></div>
        <input id="searchKeys" placeholder="🔍 Search keys..." style="width:100%;padding:12px;border:1px solid var(--border);background:var(--bg);color:var(--text);border-radius:var(--radius-sm);margin-bottom:12px;outline:none" oninput="renderKeys()">
        <div class="filters">
          <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
          <button class="filter-btn" onclick="setFilter('active',this)">Active</button>
          <button class="filter-btn" onclick="setFilter('revoked',this)">Revoked</button>
          <button class="filter-btn" onclick="setFilter('plus',this)">Plus</button>
          <button class="filter-btn" onclick="setFilter('pro',this)">Pro</button>
        </div>
        <div class="key-list" id="keyList"></div>
      </div>
    </div>

    <!-- Checkouts -->
    <div class="card" style="margin-top:20px">
      <div class="card-head"><h2>💳 Recent Checkouts</h2><span class="badge" id="coCount">0</span></div>
      <div id="checkoutList"></div>
    </div>

    <!-- Manual Confirm -->
    <div class="card" style="margin-top:20px">
      <div class="card-head"><h2>✅ Manual Confirmation</h2></div>
      <div class="inline">
        <div style="flex:2"><input id="confirmId" placeholder="Checkout ID" style="width:100%;padding:12px;border:1px solid var(--border);background:var(--bg);color:var(--text);border-radius:var(--radius-sm);outline:none"></div>
        <div style="flex:1"><button class="btn btn-success" onclick="manualConfirm()" style="padding:12px">Confirm Payment</button></div>
      </div>
    </div>

    <!-- Export -->
    <div class="card" style="margin-top:20px">
      <div class="card-head"><h2>📤 Export Data</h2></div>
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <button class="btn btn-primary" style="width:auto;padding:12px 24px" onclick="exportKeys()">📥 Keys CSV</button>
        <button class="btn btn-primary" style="width:auto;padding:12px 24px" onclick="exportCheckouts()">📥 Checkouts CSV</button>
      </div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
// FIREBASE INIT
const fc = {
  apiKey: "AIzaSyC7SjMgzuH7stBaTP-jqkHfXDLmnNJV0X8",
  authDomain: "globexo-d9ade.firebaseapp.com",
  databaseURL: "https://globexo-d9ade-default-rtdb.firebaseio.com",
  projectId: "globexo-d9ade",
  storageBucket: "globexo-d9ade.firebasestorage.app",
  messagingSenderId: "1009453417317",
  appId: "1:1009453417317:web:32538a719df79d3c6ed78c"
};
firebase.initializeApp(fc);
const a = firebase.auth();
const d = firebase.firestore();

let kt = 'single', kp = 'plus', flt = 'all', keys = [], cos = [], genKey = '';

// AUTH
a.onAuthStateChanged(u => {
  document.getElementById('loginCard').classList.toggle('hidden', !!u);
  document.getElementById('dashboard').classList.toggle('hidden', !u);
  if (u) { load(); setInterval(load, 15000); }
});

function toast(m, s) {
  const t = document.getElementById('toast');
  t.textContent = m; t.className = 'toast ' + (s ? 'e' : 's') + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

function doLogin() {
  a.signInWithEmailAndPassword(
    document.getElementById('loginEmail').value,
    document.getElementById('loginPass').value
  ).catch(e => {
    document.getElementById('loginMsg').className = 'msg error show';
    document.getElementById('loginMsg').textContent = e.message;
  });
}

function doLogout() { a.signOut(); }

// TYPE / PLAN
function setType(t) {
  kt = t;
  document.querySelectorAll('#typeSingle,#typeMulti,#typeCustom').forEach((b,i) => {
    b.classList.toggle('selected', ['single','multi','custom'][i] === t);
  });
  document.getElementById('usesRow').style.display = t === 'multi' ? 'none' : 'block';
  document.getElementById('usesInput').value = t === 'single' ? 1 : t === 'multi' ? 999999 : 5;
}

function setPlan(p) {
  kp = p;
  document.getElementById('planPlus').classList.toggle('selected', p === 'plus');
  document.getElementById('planPro').classList.toggle('selected', p === 'pro');
}

// RANDOM KEY
function rk() {
  const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s = '';
  for (let i = 0; i < 12; i++) {
    s += c[Math.floor(Math.random() * c.length)];
    if (i === 3 || i === 7) s += '-';
  }
  return 'CDK-' + s;
}

// GENERATE
async function genKey() {
  const key = rk();
  const uses = parseInt(document.getElementById('usesInput').value) || 1;
  const label = document.getElementById('labelInput').value || 'No label';
  const channel = document.getElementById('channelInput').value || 'zedoxprime1';
  const contact = document.getElementById('contactInput').value || '@zedox5';

  try {
    await d.collection('activation_keys').doc(key).set({
      key, label, plan: kp, type: kt,
      active: true, maxUses: uses, usesRemaining: uses,
      channel, contact,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      createdBy: a.currentUser?.email || 'admin',
      usedLogs: []
    });

    genKey = key;
    document.getElementById('genKeyCode').textContent = key;
    document.getElementById('genKeyDetails').innerHTML = `
      ${kp === 'plus' ? '💎 Plus' : '🔮 Pro'} · ${kt === 'single' ? '🔑 Single' : kt === 'multi' ? '♾️ Unlimited' : '📋 '+uses+' uses'}
      <br>📢 ${channel} · 📞 ${contact} · 📝 ${label}
    `;
    document.getElementById('genResult').classList.add('show');
    document.getElementById('labelInput').value = '';
    toast('✅ Key generated!', false);
    load();
  } catch(e) {
    toast('❌ ' + e.message, true);
  }
}

function copyGenKey() { navigator.clipboard.writeText(genKey); toast('📋 Copied!', false); }
function openGenLink() { window.open('/?key=' + genKey, '_blank'); }

// LOAD
async function load() {
  await Promise.all([loadKeys(), loadCOs()]);
  document.getElementById('statKeys').textContent = keys.length;
  document.getElementById('statActive').textContent = keys.filter(k => k.active).length;
  document.getElementById('statUsed').textContent = keys.filter(k => !k.active || (k.usesRemaining <= 0 && k.maxUses < 999999)).length;
  document.getElementById('statCO').textContent = cos.length;
}

async function loadKeys() {
  const sn = await d.collection('activation_keys').orderBy('createdAt','desc').limit(300).get();
  keys = []; sn.forEach(d => keys.push({ id: d.id, ...d.data() }));
  renderKeys();
  return keys;
}

function renderKeys() {
  const q = document.getElementById('searchKeys').value.toLowerCase();
  let f = keys;
  if (flt === 'active') f = f.filter(k => k.active);
  else if (flt === 'revoked') f = f.filter(k => !k.active);
  else if (flt === 'plus') f = f.filter(k => k.plan === 'plus');
  else if (flt === 'pro') f = f.filter(k => k.plan === 'pro');
  if (q) f = f.filter(k => (k.key||'').toLowerCase().includes(q) || (k.label||'').toLowerCase().includes(q) || (k.channel||'').toLowerCase().includes(q));

  document.getElementById('keyCount').textContent = f.length + ' keys';
  const l = document.getElementById('keyList');
  l.innerHTML = f.length === 0 ? '<div style="color:var(--text3);padding:40px;text-align:center">No keys found</div>' : '';
  
  f.forEach(k => {
    const div = document.createElement('div'); div.className = 'key-item';
    const usesStr = k.maxUses >= 999999 ? '♾️' : `${k.maxUses - (k.usesRemaining||0)}/${k.maxUses}`;
    div.innerHTML = `
      <div class="key-info">
        <div class="key-code">${k.key}</div>
        <div class="key-meta">${k.plan==='pro'?'🔮 Pro':'💎 Plus'} · ${k.type} · ${usesStr} used · 📝 ${k.label||'—'} · 📢 ${k.channel||'—'}</div>
      </div>
      <span class="key-status ${k.active?'active':'revoked'}">${k.active?'ACTIVE':'REVOKED'}</span>
      <div class="key-actions">
        <button class="key-btn" onclick="navigator.clipboard.writeText('${k.key}');toast('Copied!',false)">📋</button>
        ${k.active?`<button class="key-btn danger" onclick="revokeKey('${k.key}')">🚫</button>`:''}
        <button class="key-btn" onclick="editKey('${k.key}')">✏️</button>
      </div>
    `;
    l.appendChild(div);
  });
}

async function revokeKey(key) {
  if (!confirm('Revoke ' + key + '?')) return;
  await d.collection('activation_keys').doc(key).update({ active: false });
  toast('🚫 Revoked', true);
  load();
}

async function editKey(key) {
  const k = keys.find(x => x.key === key); if (!k) return;
  const ch = prompt('Channel:', k.channel || '');
  if (ch === null) return;
  const co = prompt('Contact:', k.contact || '');
  if (co === null) return;
  await d.collection('activation_keys').doc(key).update({ channel: ch, contact: co });
  toast('✏️ Updated', false);
  load();
}

function setFilter(f, el) {
  flt = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  renderKeys();
}

async function loadCOs() {
  const sn = await d.collection('checkouts').orderBy('createdAt','desc').limit(50).get();
  cos = []; sn.forEach(d => cos.push({ id: d.id, ...d.data() }));
  document.getElementById('coCount').textContent = cos.length;
  const l = document.getElementById('checkoutList');
  l.innerHTML = cos.length === 0 ? '<div style="color:var(--text3);padding:20px;text-align:center">No checkouts</div>' : '';
  cos.forEach(c => {
    const div = document.createElement('div'); div.className = 'checkout-item';
    div.innerHTML = `
      <div><b>${c.checkoutId||c.id}</b><br><span style="color:var(--text2);font-size:11px">${c.user?.name||c.user?.email||'?'} · ${c.planName||'Plus'} ${c.channel?'· 📢 '+c.channel:''}</span></div>
      <span class="co-status ${c.status==='completed'?'completed':'pending'}">${(c.status||'PENDING').toUpperCase()}</span>
      ${c.status!=='completed'?`<button class="key-btn" onclick="quickConfirm('${c.checkoutId||c.id}')">✅ Confirm</button>`:''}
    `;
    l.appendChild(div);
  });
  return cos;
}

async function quickConfirm(id) {
  await d.collection('checkouts').doc(id).update({
    status: 'completed',
    completedAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  toast('✅ Confirmed!', false);
  load();
}

async function manualConfirm() {
  const id = document.getElementById('confirmId').value.trim();
  if (!id) return;
  await quickConfirm(id);
  document.getElementById('confirmId').value = '';
}

function exportKeys() {
  let csv = 'Key,Label,Plan,Type,MaxUses,UsesRemaining,Active,Channel,Contact\n';
  keys.forEach(k => csv += `"${k.key}","${k.label||''}","${k.plan||''}","${k.type||''}",${k.maxUses||0},${k.usesRemaining||0},${k.active},"${k.channel||''}","${k.contact||''}"\n`);
  download(csv, 'zedox-keys.csv');
}

function exportCheckouts() {
  let csv = 'CheckoutID,Plan,User,Email,Status,Channel,Contact\n';
  cos.forEach(c => csv += `"${c.checkoutId||c.id}","${c.planName||''}","${c.user?.name||''}","${c.user?.email||''}","${c.status||''}","${c.channel||''}","${c.contact||''}"\n`);
  download(csv, 'zedox-checkouts.csv');
}

function download(csv, fn) {
  const b = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(b); a.download = fn; a.click();
}
</script>
</body>
</html>
